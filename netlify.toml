[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Admin subdomain routing ───────────────────────────────────────────────────
# Update the Host conditions below to match your production domain(s).
# The defaults below are placeholders — replace admin.example.com and
# example.com with the custom domain(s) configured in Netlify.

# Serve admin.html at the root of the admin subdomain
[[redirects]]
  from = "/"
  to = "/admin.html"
  status = 200
  force = true
  [redirects.conditions]
    Host = ["admin.example.com"]

# Block main site pages on admin subdomain
[[redirects]]
  from = "/index.html"
  to = "/admin.html"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["admin.example.com"]

# Block admin.html on main domain (force access via admin subdomain only)
[[redirects]]
  from = "/admin.html"
  to = "https://admin.example.com/"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["example.com", "www.example.com"]

# ── Block direct access to source file directories ────────────────────────────
[[redirects]]
  from = "/netlify/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/src/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.env*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/package*.json"
  to = "/404"
  status = 404
  force = true

# ── Security headers on all pages ─────────────────────────────────────────────
# CSP notes:
#   script-src  — 'unsafe-inline' required for the inline <script> blocks in
#                 index.html / admin.html; https://unpkg.com serves lucide icons.
#   img-src     — cdn.jsdelivr.net serves cryptocurrency icon SVGs.
#   connect-src — 'self' covers all /api/* Netlify Function calls (same-origin).
#                 wss://stream.binance.com:9443 is used for the live BTC price feed.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' wss://stream.binance.com:9443; frame-ancestors 'none';"

# ── Prevent indexing of the admin page ────────────────────────────────────────
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Cache-Control = "no-store, no-cache, must-revalidate, private"

# ── API route headers (keep strong cache/CORS controls) ───────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
