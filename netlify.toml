[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Admin subdomain routing ───────────────────────────────────────────────────
# Serve admin.html at the root of admin.nexustrade.website
[[redirects]]
  from = "/"
  to = "/admin.html"
  status = 200
  force = true
  [redirects.conditions]
    Host = ["admin.nexustrade.website"]

# Block main site pages on admin subdomain
[[redirects]]
  from = "/index.html"
  to = "/admin.html"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["admin.nexustrade.website"]

# Block admin.html on main domain (force /admin path only via subdomain)
[[redirects]]
  from = "/admin.html"
  to = "https://admin.nexustrade.website/"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["nexustrade.website", "www.nexustrade.website"]

# ── Block direct access to source file directories ────────────────────────────
[[redirects]]
  from = "/netlify/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/src/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.env*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/package*.json"
  to = "/404"
  status = 404
  force = true

# ── Security headers on all pages ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://nexustrade.website https://admin.nexustrade.website https://api.binance.com wss://stream.binance.com:9443; frame-src https://s.tradingview.com https://www.tradingview.com; frame-ancestors 'none';"

# ── Prevent indexing of the admin page ────────────────────────────────────────
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Cache-Control = "no-store, no-cache, must-revalidate, private"

# ── API route headers (keep strong cache/CORS controls) ───────────────────────
[[headers]]
  for = "/api/v2/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Block any non-v2 API paths — only /api/v2/* is supported ────────────────
[[redirects]]
  from = "/api/*"
  to = "/404"
  status = 404
  force = true
