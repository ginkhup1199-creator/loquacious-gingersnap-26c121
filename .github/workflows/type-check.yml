name: Type Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: JavaScript syntax check
        run: npm run check:js

      - name: HTML structure check
        run: npm run check:html

      - name: Endpoint uniqueness check
        run: npm run check:endpoints

      - name: Validation utility tests
        run: npm run test:validation

      - name: Source security tests
        run: npm run test:src-security
