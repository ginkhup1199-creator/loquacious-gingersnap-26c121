name: PR Source-Code Guard

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  guard:
    name: Auto-decline unauthorized pull requests
    runs-on: ubuntu-latest
    # Only act when the PR author is NOT the repository owner
    if: github.event.pull_request.user.login != 'ginkhup1199-creator'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Close PR and post decline notice
        uses: actions/github-script@v9
        with:
          script: |
            const actor = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;

            // Post a decline explanation comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🚫 **Pull Request Automatically Declined**\n\n` +
                `This pull request was opened by **@${actor}** and has been **automatically closed**.\n\n` +
                `This is a private project and **external contributions are not accepted**. ` +
                `Only the repository owner **@ginkhup1199-creator** may merge changes into this repository.\n\n` +
                `> Pull requests from users or forks other than the repository owner are automatically declined.\n\n` +
                `*This action was taken automatically by the PR Source-Code Guard workflow.*`
            });

            // Automatically close (decline) the pull request
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed',
            });
