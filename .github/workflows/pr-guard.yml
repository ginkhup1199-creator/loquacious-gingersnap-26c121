name: PR Source-Code Guard

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "netlify/functions/**"
      - "netlify/lib/**"
      - "src/**"
      - "index.html"
      - "admin.html"
      - "netlify.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/**"

jobs:
  guard:
    name: Warn on unauthorized source modification
    runs-on: ubuntu-latest
    # Only act when the PR author is NOT the repository owner
    if: github.event.pull_request.user.login != 'ginkhup1199-creator'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Post warning comment
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;

            // Check if we already commented on this PR to avoid duplicates
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const alreadyCommented = comments.data.some(
              c => c.user.login === 'github-actions[bot]' &&
                   c.body.includes('🔒 **Source-Code Protection Warning**')
            );

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## 🔒 **Source-Code Protection Warning**\n\n` +
                  `This pull request was opened by **@${actor}** and modifies one or more **protected source files**.\n\n` +
                  `All changes to \`netlify/functions/\`, \`netlify/lib/\`, \`src/\`, \`index.html\`, \`admin.html\`, ` +
                  `\`netlify.toml\`, \`package.json\`, or \`.github/\` require explicit approval from the repository owner ` +
                  `**@ginkhup1199-creator** via the CODEOWNERS rule before they can be merged.\n\n` +
                  `> ⚠️ **This PR will not be merged without owner review.** If you believe this change is legitimate, ` +
                  `contact the repository owner directly.\n\n` +
                  `*This comment was posted automatically by the PR Source-Code Guard workflow.*`
              });
            }
