name: Publish v1.0.0 Release

# Runs once when main receives a commit that sets version to 1.0.0.
# Creates an immutable GitHub Release (archive) so the tag is permanently
# recorded and the code at that point cannot be overwritten.
on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  release:
    name: Create v1.0.0 GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Skip if tag already exists
        id: check_tag
        run: |
          if git tag --list "v${{ steps.pkg.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create annotated tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.pkg.outputs.version }}" \
            -m "NexusTrade v${{ steps.pkg.outputs.version }} â€” archived production release"
          git push origin "v${{ steps.pkg.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.pkg.outputs.version }}";
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version} â€” Initial Production Release`,
              body: [
                `## NexusTrade v${version}`,
                "",
                "### What's included",
                "- Zero TypeScript errors in all backend Netlify Functions (strict mode)",
                "- `tsconfig.json` added with esbuild-compatible `bundler` module resolution",
                "- `@netlify/blobs` pinned to `9.1.2` â€” version deduped, Store type conflict resolved",
                "- `@types/nodemailer` added â€” nodemailer TS7016 error resolved",
                "- All `req.json()` calls properly typed (`as Record<string, unknown>`)",
                "- `npm run typecheck` script wired to CI (`integrity-check.yml`)",
                "- `.env.production` expanded with `APP_VERSION=1.0.0` and all optional keys documented",
                "",
                "### Archive policy",
                "This release is an **immutable archive**. The CODEOWNERS file and branch",
                "protection rules prevent any non-owner modifications to core source files.",
                "The PR Guard workflow auto-closes pull requests from non-owner accounts.",
              ].join("\n"),
              draft: false,
              prerelease: false,
              make_latest: true,
            });
