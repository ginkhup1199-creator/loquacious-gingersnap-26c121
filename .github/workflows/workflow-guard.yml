name: Workflow File Guard

on:
  pull_request:
    branches: ["**"]
    paths:
      - ".github/workflows/**"
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate workflow allowlist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fail if unauthorized workflow files are detected
        run: |
          sh scripts/check-workflow-allowlist.sh
