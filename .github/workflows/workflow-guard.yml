name: Workflow File Guard

on:
  pull_request:
    branches: ["**"]
    paths:
      - ".github/workflows/**"
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate workflow allowlist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fail if unauthorized workflow files are detected
        run: |
          sh scripts/check-workflow-allowlist.sh

  remediate:
    name: Optional workflow remediation
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.event_name == 'push' &&
      github.actor == github.repository_owner &&
      contains(github.event.head_commit.message, '[workflow-remediate]')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove unauthorized workflow files when remediation is enabled
        env:
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -eu
          git config user.email "guard-bot@nexustrade.website"
          git config user.name "NexusTrade Guard Bot"

          ORIGIN_URL="$(git remote get-url origin)"
          case "$ORIGIN_URL" in
            "https://github.com/$REPOSITORY"|"https://github.com/$REPOSITORY.git"|"git@github.com:$REPOSITORY.git")
              echo "Origin remote is scoped to this repository: $REPOSITORY"
              ;;
            *)
              echo "Refusing to push: origin remote does not match current repository ($REPOSITORY)."
              echo "Detected origin remote: $ORIGIN_URL"
              exit 1
              ;;
          esac

          sh scripts/check-workflow-allowlist.sh --remediate

          if [ -n "$(git status --porcelain -- .github/workflows)" ]; then
            git commit -m "security: delete unauthorized workflow addition by $ACTOR [automated]"
            git push origin HEAD
            echo "Unauthorized workflow files removed."
          else
            echo "All workflow files are approved. No action needed."
          fi
