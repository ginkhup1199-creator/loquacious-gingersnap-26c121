name: Workflow File Guard

on:
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/**"

jobs:
  guard:
    name: Remove unauthorized workflow files
    runs-on: ubuntu-latest
    # Applies to ALL actors — the 4 approved workflows are the permanent final set
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce approved workflow allowlist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Scanning .github/workflows/ for unauthorized files..."

          # Permanent approved set — these are the ONLY allowed workflow files
          APPROVED=(
            ".github/workflows/pr-guard.yml"
            ".github/workflows/integrity-check.yml"
            ".github/workflows/auto-deploy.yml"
            ".github/workflows/workflow-guard.yml"
          )

          # Build a lookup string
          APPROVED_STR=$(printf "\n%s" "${APPROVED[@]}")

          # Configure git identity for any revert commit
          git config user.email "guard-bot@nexustrade.website"
          git config user.name "NexusTrade Guard Bot"

          REVERTED=""
          for FILE in .github/workflows/*.yml; do
            if ! echo "$APPROVED_STR" | grep -qxF "$FILE"; then
              echo "🗑️  Deleting unauthorized workflow file: $FILE (pushed by $ACTOR)"
              git rm --force "$FILE"
              REVERTED="$REVERTED $FILE"
            else
              echo "  ✅  Approved: $FILE"
            fi
          done

          if [ -n "$REVERTED" ]; then
            git commit -m "security: delete unauthorized workflow addition by $ACTOR [automated]"
            git push origin HEAD
            echo "Unauthorized workflow files removed."
          else
            echo "All workflow files are approved. No action needed."
          fi
