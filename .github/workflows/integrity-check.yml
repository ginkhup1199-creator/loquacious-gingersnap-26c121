name: Code Integrity Check

on:
  # Avoid running on every branch push ("**") which can create noisy/blocked checks.
  # Run on PRs (so contributors get feedback) and on pushes to the default branch.
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

# Least privilege by default; jobs can override if needed.
permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        run: npx tsc --noEmit

  workflow-allowlist:
    name: Workflow Directory Lockdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if any unauthorized workflow file exists
        shell: bash
        run: |
          set -euo pipefail

          APPROVED=(
            ".github/workflows/pr-guard.yml"
            ".github/workflows/integrity-check.yml"
            ".github/workflows/auto-deploy.yml"
            ".github/workflows/workflow-guard.yml"
            ".github/workflows/type-check.yml"
            ".github/workflows/security-audit.yml"
          )

          APPROVED_STR=$(printf "%s\n" "${APPROVED[@]}")
          FAIL=false

          shopt -s nullglob
          for FILE in .github/workflows/*.yml; do
            if ! grep -qxF "$FILE" <<<"$APPROVED_STR"; then
              echo "::error file=$FILE::UNAUTHORIZED workflow file detected: $FILE — only the approved workflows are allowed."
              FAIL=true
            fi
          done

          if [ "$FAIL" = true ]; then
            echo "CI failed: unauthorized workflow file(s) present. Remove them and push again."
            exit 1
          fi

          echo "All workflow files are in the approved set."

  protected-files-guard:
    name: Protected Files — Unauthorized Change Detection
    runs-on: ubuntu-latest
    # Only runs on pull_request events so we can inspect what changed
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List files changed in this PR
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" || true)

          echo "Changed files:"
          echo "$CHANGED"

          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for modifications to protected paths
        shell: bash
        run: |
          set -euo pipefail

          PROTECTED_PATTERNS=(
            "netlify/functions/"
            "netlify/lib/"
            "src/"
            "index.html"
            "admin.html"
            "netlify.toml"
            "package.json"
            "package-lock.json"
          )

          ACTOR="${{ github.actor }}"
          OWNER="${{ github.repository_owner }}"
          CHANGED="${{ steps.changed.outputs.files }}"
          FLAGGED=""

          for PATTERN in "${PROTECTED_PATTERNS[@]}"; do
            MATCHES=$(printf "%s\n" "$CHANGED" | grep -E "^${PATTERN}" || true)
            if [ -n "$MATCHES" ] && [ "$ACTOR" != "$OWNER" ]; then
              FLAGGED="$FLAGGED\n$MATCHES"
            fi
          done

          if [ -n "$FLAGGED" ]; then
            echo "::warning::Pull request from '$ACTOR' modifies protected source files that require owner review:"
            echo -e "$FLAGGED"
            echo ""
            echo "Branch protection rules must be enabled on this repository to enforce CODEOWNERS review."
            echo "The repository owner (@$OWNER) must approve this PR before it can be merged."
          else
            echo "No protected files modified by non-owner, or actor is the owner. All clear."
          fi
