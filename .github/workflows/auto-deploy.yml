name: Auto Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only the repository owner may trigger a production deploy
    if: github.actor == 'ginkhup1199-creator'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (pre-deploy gate)
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --audit-level=high
        # Fail the deploy if any HIGH or CRITICAL vulnerabilities exist in dependencies

      - name: Deploy to Netlify Production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN || '' }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || '' }}
        run: npx netlify-cli deploy --prod --dir . --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"

      - name: Health check — verify deployment is live
        run: |
          echo "Waiting 15 seconds for CDN propagation..."
          sleep 15
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: NexusTrade-API-v2" https://nexustrade.website/api/v2/system/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed — /api/v2/system/health returned HTTP 200"
              break
            fi
            echo "Attempt $i — HTTP $STATUS, retrying in 10s..."
            if [ "$i" = "3" ]; then
              echo "❌ Health check FAILED after 3 attempts — HTTP $STATUS"
              exit 1
            fi
            sleep 10
          done

      - name: "Verify: system/health"
        run: |
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: NexusTrade-API-v2" https://nexustrade.website/api/v2/system/health)
            [ "$CODE" = "200" ] && echo "✅ health → 200" && exit 0
            echo "⚠️ Attempt $i: health → $CODE"; [ "$i" -lt "3" ] && sleep 8
          done
          echo "❌ health FAILED"; exit 1

      - name: "Verify: system/version"
        run: |
          for i in 1 2 3; do
            BODY=$(curl -s -w "\nHTTP:%{http_code}" -H "User-Agent: NexusTrade-API-v2" https://nexustrade.website/api/v2/system/version)
            CODE=$(echo "$BODY" | tail -1 | cut -d: -f2)
            [ "$CODE" = "200" ] && echo "✅ version → 200" && exit 0
            echo "⚠️ Attempt $i: version → $CODE — $(echo "$BODY" | head -3)"; [ "$i" -lt "3" ] && sleep 8
          done
          echo "❌ version FAILED"; exit 1

      - name: "Verify: market-data"
        run: |
          for i in 1 2 3; do
            BODY=$(curl -s -w "\nHTTP:%{http_code}" -H "User-Agent: NexusTrade-API-v2" "https://nexustrade.website/api/v2/market-data?type=prices")
            CODE=$(echo "$BODY" | tail -1 | cut -d: -f2)
            [ "$CODE" = "200" ] && echo "✅ market-data → 200" && exit 0
            echo "⚠️ Attempt $i: market-data → $CODE — $(echo "$BODY" | head -3)"; [ "$i" -lt "3" ] && sleep 8
          done
          echo "❌ market-data FAILED"; exit 1

      - name: "Verify: features"
        run: |
          for i in 1 2 3; do
            BODY=$(curl -s -w "\nHTTP:%{http_code}" -H "User-Agent: NexusTrade-API-v2" https://nexustrade.website/api/v2/features)
            CODE=$(echo "$BODY" | tail -1 | cut -d: -f2)
            [ "$CODE" = "200" ] && echo "✅ features → 200" && exit 0
            echo "⚠️ Attempt $i: features → $CODE — $(echo "$BODY" | head -3)"; [ "$i" -lt "3" ] && sleep 8
          done
          echo "❌ features FAILED"; exit 1

      - name: "Verify: levels"
        run: |
          for i in 1 2 3; do
            BODY=$(curl -s -w "\nHTTP:%{http_code}" -H "User-Agent: NexusTrade-API-v2" https://nexustrade.website/api/v2/levels)
            CODE=$(echo "$BODY" | tail -1 | cut -d: -f2)
            [ "$CODE" = "200" ] && echo "✅ levels → 200" && exit 0
            echo "⚠️ Attempt $i: levels → $CODE — $(echo "$BODY" | head -3)"; [ "$i" -lt "3" ] && sleep 8
          done
          echo "❌ levels FAILED"; exit 1

      - name: "Verify: docs"
        run: |
          for i in 1 2 3; do
            BODY=$(curl -s -w "\nHTTP:%{http_code}" -H "User-Agent: NexusTrade-API-v2" https://nexustrade.website/api/v2/docs)
            CODE=$(echo "$BODY" | tail -1 | cut -d: -f2)
            [ "$CODE" = "200" ] && echo "✅ docs → 200" && exit 0
            echo "⚠️ Attempt $i: docs → $CODE — $(echo "$BODY" | head -3)"; [ "$i" -lt "3" ] && sleep 8
          done
          echo "❌ docs FAILED"; exit 1
