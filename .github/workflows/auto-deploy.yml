name: Auto Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only the repository owner may trigger a production deploy
    if: github.actor == 'ginkhup1199-creator'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (pre-deploy gate)
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --audit-level=high
        # Fail the deploy if any HIGH or CRITICAL vulnerabilities exist in dependencies

      - name: Deploy to Netlify Production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN || '' }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || '63597bc2-3179-46c1-86c7-391dee789a14' }}
        run: npx netlify-cli deploy --prod --dir . --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"

      - name: Health check — verify deployment is live
        run: |
          echo "Waiting 15 seconds for CDN propagation..."
          sleep 15
          # Use || true so curl SSL/network errors don't abort the script (bash -e);
          # the HTTP status code check below will still catch a non-200 response.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nexustrade.website/api/v2/system/health) || true
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed — /api/v2/system/health returned HTTP 200"
          else
            echo "❌ Health check FAILED — /api/v2/system/health returned HTTP $STATUS"
            exit 1
          fi

      - name: Verify all critical API endpoints respond
        run: |
          ENDPOINTS=(
            "https://nexustrade.website/api/v2/system/health"
            "https://nexustrade.website/api/v2/market-data?type=prices"
            "https://nexustrade.website/api/v2/features"
            "https://nexustrade.website/api/v2/levels"
          )
          ALL_OK=true
          for URL in "${ENDPOINTS[@]}"; do
            # || true prevents bash -e from exiting with curl's error code (e.g. 35 for
            # SSL_CONNECT_ERROR) when used inside a command substitution assignment.
            # The HTTP status captured in CODE is still checked to detect real failures.
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL") || true
            if [ "$CODE" = "200" ]; then
              echo "  ✅  $URL → $CODE"
            else
              echo "  ❌  $URL → $CODE"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            echo "One or more endpoints are not responding — check Netlify function logs."
            exit 1
          fi
          echo "All endpoints healthy."
